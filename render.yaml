services:
  - type: web
    name: coap-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: AWS_API_ID
        sync: false
      - key: AWS_API_KEY
        sync: false
      - key: AWS_S3
        sync: false
      - key: AWS_REGION
        sync: false
      - key: GEMINI_API_KEY
        sync: false
